name: Orbit Backend CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: orbit_user
          POSTGRES_PASSWORD: orbit_password
          POSTGRES_DB: orbit_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:alpine
        ports:
          - 6379:6379

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install black flake8 pytest pytest-cov

      - name: Enforce Formatting (Black)
        run: black backend/ --check

      - name: Lint Code (Flake8)
        run: flake8 backend/

      - name: Run Security & Logic Tests (Pytest)
        env:
          SECRET_KEY: ci-cd-temporary-secret-key-for-testing
          DATABASE_URL: postgresql+psycopg2://orbit_user:orbit_password@localhost:5432/orbit_db
          REDIS_URL: redis://localhost:6379/0
        run: |
          cd backend
          alembic upgrade head
          pytest --cov=. --cov-report=xml --cov-fail-under=75

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v3
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
