services:
  # 1. THE DATABASE ENGINE
  db:
    image: postgres:16-alpine
    container_name: orbit_db_prod
    restart: always
    environment:
      POSTGRES_USER: orbit_admin
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: orbit_database
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data

  # 2. REDIS SECURITY
  redis:
    image: redis:alpine
    container_name: orbit_redis_prod
    command: redis-server --requirepass ${REDIS_PASSWORD}
    restart: always
      
  # 3. THE FASTAPI BACKEND
  backend:
    build: ./backend
    container_name: orbit_backend_prod
    restart: always
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+psycopg2://orbit_admin:${POSTGRES_PASSWORD}@db:5432/orbit_database
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - FRONTEND_URL=https://orbitworkspace.xyz
    depends_on:
      - db
      - redis

  # 4. THE REACT FRONTEND SPA + NGINX REVERSE PROXY
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
    container_name: orbit_frontend_prod
    restart: always
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend

# PERMANENT STORAGE
volumes:
  postgres_data_prod:
