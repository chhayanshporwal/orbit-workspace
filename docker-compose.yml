services:
  # 1. THE DATABASE ENGINE
  db:
    image: postgres:16-alpine
    container_name: orbit_db
    restart: always
    environment:
      POSTGRES_USER: orbit_admin
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: orbit_database
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # 2. REDIS SECURITY
  redis:
    image: redis:alpine
    container_name: orbit_redis
    command: redis-server --requirepass ${REDIS_PASSWORD}
      
  # 3. THE VISUAL DASHBOARD (pgAdmin)
  pgadmin:
    image: dpage/pgadmin4
    container_name: orbit_pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@orbit.com
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
    ports:
      - "5050:80"
    depends_on:
      - db

  # 4. THE FASTAPI BACKEND
  backend:
    build: ./backend
    container_name: orbit_backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+psycopg2://orbit_admin:${POSTGRES_PASSWORD}@db:5432/orbit_database
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
    depends_on:
      - db
      - redis
    volumes:
      - ./backend:/app

  # 6. THE REACT FRONTEND SPA
  frontend:
    build:
      context: ./frontend
      args:
        - VITE_GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
    container_name: orbit_frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

# 5. PERMANENT STORAGE
volumes:
  postgres_data:


